name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional: Release-Tag, z. B. v1.0.0. Wenn gesetzt, wird eine öffentliche GitHub Release erstellt."
        required: false
        default: ""
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build ArbeitszeitTracker.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run tests
        run: python -m pytest

      - name: Build executable
        run: python build_windows.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ArbeitszeitTracker-Windows
          path: dist/ArbeitszeitTracker.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: ArbeitszeitTracker ${{ github.event.inputs.release_tag || github.ref_name }}
          body: |
            Fertige Windows-Version.

            Download:
            - ArbeitszeitTracker.exe herunterladen
            - starten
            - keine Python-Installation nötig
          files: dist/ArbeitszeitTracker.exe

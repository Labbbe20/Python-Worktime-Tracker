name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional: Release-Tag, z. B. v1.0.0. Wenn gesetzt, wird eine öffentliche GitHub Release erstellt."
        required: false
        default: ""
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build ArbeitszeitTracker.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run tests
        run: python -m pytest

      - name: Build executable
        run: python build_windows.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ArbeitszeitTracker-Windows
          path: dist/ArbeitszeitTracker.exe
          if-no-files-found: error

      - name: Resolve release tag
        id: release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            if ("${{ startsWith(github.ref, 'refs/tags/v') }}" -eq "true") {
              $tag = "${{ github.ref_name }}"
            } else {
              $tag = "v0.0.${{ github.run_number }}"
            }
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ArbeitszeitTracker ${{ steps.release.outputs.tag }}
          body: |
            Fertige Windows-Version.

            Download:
            - ArbeitszeitTracker.exe herunterladen
            - starten
            - keine Python-Installation nötig
          files: dist/ArbeitszeitTracker.exe
          overwrite_files: true
          make_latest: true
